<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>See More Video</title>
  <link href="/images/favicon.png" rel="icon" type="image/png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#0b101d;color:#111;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px}
    .container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
    .video-wrapper{width:720px;max-width:90%;background:#000;border-radius:10px;overflow:hidden}
    .video-wrapper iframe{width:100%;aspect-ratio:16/9;display:block;border:0;background:#000}
    #ad-link{display:inline-block;padding:12px 24px;background:#000;color:white;text-decoration:none;border-radius:8px;font-family:Arial}
    footer{text-align:center;padding:24px;font-size:13px;color:#666;display:flex;justify-content:center;gap:30px}
    footer a{text-decoration:none;color:#666}
    @media(max-width:768px){
      header{padding:14px 16px}
      .container{padding:0 12px}
      .video-wrapper{max-width:100%;border-radius:10px}
      .video-wrapper iframe{aspect-ratio:16/9}
      footer{flex-direction:column;gap:10px}
    }
  </style>
</head>
<body oncontextmenu="return false">

<header></header>

<main class="container">
  <div class="video-wrapper">
    <iframe id="mainVideoFrame" src="" allowfullscreen allow="autoplay"></iframe>
  </div>

  <a id="ad-link" href="#"><strong>See More Video</strong></a>
</main>

<footer>
  <center><div class="copyright"><font color="black">Copyright @ 2026 <strong>Facebook</strong></font></div></center>
</footer>

<script>
  // Ambil video berdasarkan ?id= dari videos.json
  async function initPlayerSystem(){
    const params = new URLSearchParams(window.location.search);
    const currentId = params.get('id');

    try{
      const response = await fetch('videos.json');
      const videos = await response.json();
      const targetVideo = videos.find(v => v.id == currentId) || videos[0];

      if(targetVideo){
        document.getElementById('mainVideoFrame').src = targetVideo.url;
        document.title = targetVideo.title || 'See More Video';
      }
    }catch(error){
      console.error('Gagal memuat video:', error);
    }
  }

  // Tautan See More Video
  document.getElementById('ad-link').href = 'https://tautan-kita.com';

  // Disable right click dan shortcut inspect
  document.addEventListener('contextmenu', event => event.preventDefault());
  document.addEventListener('keydown', function(e){
    if(e.key === 'F12' ||
       (e.ctrlKey && e.shiftKey && ['I','J'].includes(e.key.toUpperCase())) ||
       (e.ctrlKey && e.key.toLowerCase() === 'u')){
      e.preventDefault();
    }
  });

  window.onload = initPlayerSystem;
</script>

</body>
</html>
